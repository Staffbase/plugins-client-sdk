# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Continuous Integration

on:
  push:
    branches:
      - "**"

permissions:
  id-token: write #required for oidc
  contents: read # we need to read secrets

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: yarn install

      - name: Lint code
        run: yarn lint

      - name: Unit test
        run: yarn jest --coverage --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: junit-report
          JEST_JUNIT_OUTPUT_NAME: results.xml

      - name: Upload test report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: junit-xml
          path: junit-report/*.xml
          retention-days: 1
          if-no-files-found: warn

  push-test-results:
    name: Push test results
    if: ${{ always() }}
    needs: [test]
    uses: Staffbase/test-monitoring-connector-junit/.github/workflows/connector-junit.yml@a695b35c6b678742bc696a378dc9a307e96cebcd # includes module-fetch retry fix (test-monitoring-connector-junit#12)
    with:
      artifact-pattern: junit-xml*
      glob: 'junit-report/*.xml'
      connector-version: a695b35c6b678742bc696a378dc9a307e96cebcd # v2026.28.2 (per-test started_at fix)
      app-id: ${{ vars.STAFFBASE_ACTIONS_CLIENT_ID }}
    secrets:
      service-secret: ${{ secrets.TEST_MONITORING_SERVICE_SECRET }}
      app-private-key: ${{ secrets.STAFFBASE_ACTIONS_PRIVATE_KEY }}

  release:
    name: Release
    needs: test
    permissions: write-all
    runs-on: ubuntu-24.04
    steps:
      - name: Obtain App Token
        uses: actions/create-github-app-token@v1.10.3
        id: get_token
        with:
          app-id: ${{ vars.STAFFBASE_ACTIONS_APP_ID }}
          private-key: ${{ secrets.STAFFBASE_ACTIONS_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: 'https://npm.pkg.github.com'
          scope: '@staffbase'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Release
        uses: cycjimmy/semantic-release-action@v4
        id: semantic
        with:
          semantic_version: 23.0.0
          extra_plugins: |
            conventional-changelog-conventionalcommits
        env:
          NODE_AUTH_TOKEN: ${{ secrets.STAFFBOT_NPM_WRITE }}
          GITHUB_TOKEN: ${{ steps.get_token.outputs.token }}

      - uses: actions/setup-node@v4
        if: steps.semantic.outputs.new_release_published == 'true'
        with:
          node-version: 24.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@staffbase'

      - name: Publish to NPM
        if: steps.semantic.outputs.new_release_published == 'true' && github.ref != 'refs/heads/alpha'
        run: |
          npm publish --access public --provenance
